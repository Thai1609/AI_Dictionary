server.port=${PORT:8080}

spring.application.name=backend

# =========================
# PostgreSQL
# =========================
spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.datasource.hikari.pool-name=AiDictionaryPool
spring.datasource.hikari.connection-timeout=${DB_CONNECTION_TIMEOUT:30000}
spring.datasource.hikari.validation-timeout=${DB_VALIDATION_TIMEOUT:5000}
spring.datasource.hikari.idle-timeout=${DB_IDLE_TIMEOUT:600000}
spring.datasource.hikari.max-lifetime=${DB_MAX_LIFETIME:1800000}
spring.datasource.hikari.maximum-pool-size=${DB_MAX_POOL_SIZE:5}
spring.datasource.hikari.minimum-idle=${DB_MIN_IDLE:1}
spring.datasource.hikari.connection-test-query=SELECT 1

# =========================
# JPA / Hibernate
# =========================
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=${JPA_DDL_AUTO:update}
spring.jpa.open-in-view=false
spring.jpa.show-sql=${JPA_SHOW_SQL:false}
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.default_batch_fetch_size=50

spring.sql.init.mode=${SPRING_SQL_INIT_MODE:never}

# =========================
# CORS
# =========================
app.cors.allowed-origin=${CORS_ALLOWED_ORIGIN}

# =========================
# Gemini
# =========================
gemini.api-key=${GEMINI_API_KEY:}
gemini.model=${GEMINI_MODEL:gemini-2.0-flash}
gemini.fallback-model=${GEMINI_FALLBACK_MODEL:gemini-2.5-flash}
gemini.base-url=https://generativelanguage.googleapis.com/v1beta
gemini.timeout-ms=${GEMINI_TIMEOUT_MS:50000}
