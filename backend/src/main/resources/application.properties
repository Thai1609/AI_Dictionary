server.port=${PORT:8080}

spring.application.name=backend
spring.threads.virtual.enabled=${SPRING_THREADS_VIRTUAL_ENABLED:true}

spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=${JPA_DDL_AUTO:update}
spring.jpa.open-in-view=false
spring.jpa.show-sql=${JPA_SHOW_SQL:false}
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.default_batch_fetch_size=50
spring.jpa.defer-datasource-initialization=true

spring.datasource.hikari.connection-timeout=20000
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=2

app.cors.allowed-origin=${CORS_ALLOWED_ORIGIN}

gemini.api-key=${GEMINI_API_KEY:}
gemini.model=${GEMINI_MODEL:gemini-2.0-flash}
gemini.fallback-model=${GEMINI_FALLBACK_MODEL:gemini-2.5-flash}
gemini.base-url=https://generativelanguage.googleapis.com/v1beta
gemini.timeout-ms=${GEMINI_TIMEOUT_MS:20000}
